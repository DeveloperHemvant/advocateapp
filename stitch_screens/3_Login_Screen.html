<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e3b8a",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121620",
                        "slate-900": "#0F172A",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>SaaS Login</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">
<!-- Card Container -->
<div class="bg-white dark:bg-slate-900 shadow-xl rounded-xl overflow-hidden border border-slate-200/50 dark:border-slate-800/50">
<!-- Header Section -->
<div class="p-8 pb-4">
<div class="flex items-center justify-between mb-8">
<div class="size-10 bg-primary/10 rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl">shield_person</span>
</div>
<a class="text-sm font-semibold text-primary hover:underline" href="#">Help Center</a>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight mb-2">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 text-base">Enter your credentials to access your dashboard</p>
</div>
<!-- Form Section -->
<form class="p-8 pt-4 space-y-5" onsubmit="return false;">
<!-- Mobile Number Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-900 dark:text-slate-200">Mobile Number</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-xl">smartphone</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-background-light dark:bg-slate-800 border-none rounded-lg text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-primary transition-all" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-medium text-slate-900 dark:text-slate-200">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-3.5 bg-background-light dark:bg-slate-800 border-none rounded-lg text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-primary transition-all" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-2 space-y-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3.5 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
                        Login
                        <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<button class="w-full bg-primary/5 hover:bg-primary/10 text-primary font-semibold py-3.5 rounded-lg transition-all" type="button">
                        Login with OTP
                    </button>
</div>
</form>
<!-- Footer Section -->
<div class="p-8 pt-0 border-t border-slate-100 dark:border-slate-800 mt-4 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Create Account</a>
</p>
</div>
</div>
<!-- Secondary Navigation/Links -->
<div class="mt-8 flex justify-center gap-6 text-sm text-slate-400">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
</div>
</div>
</body></html>
