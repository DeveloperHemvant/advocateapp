<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e3b8a",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121620",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Add Hearing Details</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden" id="add_hearing_form">
<!-- Top Navigation Bar -->
<div class="sticky top-0 z-10 flex items-center bg-white/80 dark:bg-background-dark/80 backdrop-blur-md p-4 border-b border-slate-200 dark:border-slate-800 justify-between">
<div class="text-primary flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Add Hearing Details</h2>
<div class="size-10"></div> <!-- Placeholder for symmetry -->
</div>
<main class="flex-1 max-w-2xl mx-auto w-full p-4 space-y-6">
<!-- Section: Hearing Information -->
<section class="space-y-4">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary">event_note</span>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">Hearing Information</h3>
</div>
<div class="bg-white dark:bg-slate-900 rounded-xl p-4 shadow-sm border border-slate-200 dark:border-slate-800 space-y-6">
<!-- Date Selection UI -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Hearing Date</label>
<div class="flex flex-col gap-4 items-center sm:flex-row sm:items-start">
<!-- Mini Calendar Picker -->
<div class="flex flex-col gap-1 bg-slate-50 dark:bg-slate-800/50 p-3 rounded-lg border border-slate-100 dark:border-slate-800 w-full sm:w-auto">
<div class="flex items-center justify-between pb-2 border-b border-slate-200 dark:border-slate-700 mb-2">
<button class="p-1 hover:text-primary"><span class="material-symbols-outlined text-sm">chevron_left</span></button>
<p class="text-xs font-bold uppercase tracking-wider">October 2023</p>
<button class="p-1 hover:text-primary"><span class="material-symbols-outlined text-sm">chevron_right</span></button>
</div>
<div class="grid grid-cols-7 gap-1 text-[10px] text-center">
<span class="font-bold opacity-50">S</span><span class="font-bold opacity-50">M</span><span class="font-bold opacity-50">T</span><span class="font-bold opacity-50">W</span><span class="font-bold opacity-50">T</span><span class="font-bold opacity-50">F</span><span class="font-bold opacity-50">S</span>
<button class="size-7 flex items-center justify-center rounded-full hover:bg-primary/20">1</button>
<button class="size-7 flex items-center justify-center rounded-full hover:bg-primary/20">2</button>
<button class="size-7 flex items-center justify-center rounded-full hover:bg-primary/20">3</button>
<button class="size-7 flex items-center justify-center rounded-full hover:bg-primary/20">4</button>
<button class="size-7 flex items-center justify-center rounded-full bg-primary text-white">5</button>
<button class="size-7 flex items-center justify-center rounded-full hover:bg-primary/20">6</button>
<button class="size-7 flex items-center justify-center rounded-full hover:bg-primary/20">7</button>
</div>
</div>
<!-- Input Field Version -->
<div class="flex-1 w-full space-y-4">
<div class="relative">
<input class="w-full h-12 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg pl-10 focus:ring-primary focus:border-primary" placeholder="October 5, 2023" type="text" value="October 5, 2023"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">calendar_today</span>
</div>
<!-- Time Picker Section -->
<div class="space-y-2">
<label class="text-xs font-semibold text-slate-500 uppercase">Select Time</label>
<div class="flex gap-2">
<div class="flex-1 flex overflow-hidden rounded-lg border border-slate-200 dark:border-slate-700">
<div class="flex-1 flex flex-col items-center bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-700">
<span class="text-[10px] text-slate-400 pt-1">HH</span>
<span class="text-lg font-bold py-1">10</span>
</div>
<div class="flex-1 flex flex-col items-center bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-700">
<span class="text-[10px] text-slate-400 pt-1">MM</span>
<span class="text-lg font-bold py-1">30</span>
</div>
<div class="flex-1 flex flex-col items-center bg-primary/10 dark:bg-primary/20">
<span class="text-[10px] text-primary pt-1">AM/PM</span>
<span class="text-lg font-bold py-1 text-primary">AM</span>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Court and Purpose Fields -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Court / Room Number</label>
<div class="relative">
<input class="w-full h-12 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg pl-10 focus:ring-primary focus:border-primary" placeholder="e.g. Court Room 402" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">account_balance</span>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Purpose of Hearing</label>
<div class="relative">
<select class="w-full h-12 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg pl-10 pr-10 appearance-none focus:ring-primary focus:border-primary">
<option>Mention</option>
<option>Trial</option>
<option>Argument</option>
<option>Judgment</option>
<option>Interim Order</option>
</select>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">gavel</span>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
</div>
</div>
</section>
<!-- Section: Last Hearing Result -->
<section class="space-y-4">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary">history_edu</span>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">Last Hearing Result</h3>
</div>
<div class="bg-white dark:bg-slate-900 rounded-xl p-4 shadow-sm border border-slate-200 dark:border-slate-800 space-y-4">
<p class="text-xs text-slate-500 dark:text-slate-400 italic">Capture the conclusion or notes from the previous session to provide context for this hearing.</p>
<div class="relative">
<textarea class="w-full min-h-[120px] bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg p-3 pt-4 focus:ring-primary focus:border-primary resize-none placeholder:text-slate-400" placeholder="Summarize the previous conclusion or orders passed..."></textarea>
</div>
<div class="flex flex-wrap gap-2">
<button class="px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-700 text-xs font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Adjourned</button>
<button class="px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-700 text-xs font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Order Reserved</button>
<button class="px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-700 text-xs font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Evidence Recorded</button>
<button class="px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-700 text-xs font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Dismissed</button>
</div>
</div>
</section>
<!-- Action Buttons -->
<div class="pt-6 pb-12 flex flex-col sm:flex-row gap-3">
<button class="flex-1 h-14 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                    Save Hearing Details
                </button>
<button class="flex-1 h-14 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold rounded-xl border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all">
                    Cancel
                </button>
</div>
</main>
<!-- Fixed Footer Navigation (Optional for Mobile feel) -->
<div class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-background-dark/95 backdrop-blur-sm border-t border-slate-200 dark:border-slate-800 px-6 py-2 flex justify-around items-center md:hidden">
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-[10px]">Dashboard</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary font-bold">
<span class="material-symbols-outlined">add_circle</span>
<span class="text-[10px]">Add Details</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">description</span>
<span class="text-[10px]">Cases</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px]">Settings</span>
</button>
</div>
</div>
</body></html>
