<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#1e3b8a",
              "background-light": "#f6f6f8",
              "background-dark": "#121620",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>Verify Mobile</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased transition-colors duration-300">
<div class="flex flex-col min-h-screen items-center justify-center p-4">
<!-- Main Container -->
<div class="w-full max-w-md bg-white dark:bg-slate-900 shadow-xl rounded-xl overflow-hidden p-8 border border-slate-200 dark:border-slate-800">
<!-- Header/Navigation -->
<div class="flex items-center justify-between mb-8">
<button class="text-slate-900 dark:text-slate-100 p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined block">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">Verify Mobile</h2>
<div class="w-10"></div> <!-- Spacer to center title -->
</div>
<!-- Content Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-full mb-6">
<span class="material-symbols-outlined text-primary text-3xl">vibration</span>
</div>
<h3 class="text-slate-900 dark:text-slate-100 text-2xl font-bold tracking-tight mb-2">Verify Mobile</h3>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal max-w-[280px] mx-auto">
                    Enter the 6-digit code sent to your mobile.
                </p>
</div>
<!-- OTP Input Form -->
<form action="#" class="space-y-8" method="POST">
<div class="flex justify-center gap-2 sm:gap-4">
<fieldset class="relative flex gap-2 sm:gap-3">
<input class="flex h-12 w-10 sm:h-14 sm:w-12 text-center [appearance:textfield] focus:outline-none focus:ring-2 focus:ring-primary/50 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-lg font-semibold text-slate-900 dark:text-slate-100 transition-all" inputmode="numeric" max="9" maxlength="1" pattern="[0-9]*" type="text"/>
<input class="flex h-12 w-10 sm:h-14 sm:w-12 text-center [appearance:textfield] focus:outline-none focus:ring-2 focus:ring-primary/50 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-lg font-semibold text-slate-900 dark:text-slate-100 transition-all" inputmode="numeric" max="9" maxlength="1" pattern="[0-9]*" type="text"/>
<input class="flex h-12 w-10 sm:h-14 sm:w-12 text-center [appearance:textfield] focus:outline-none focus:ring-2 focus:ring-primary/50 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-lg font-semibold text-slate-900 dark:text-slate-100 transition-all" inputmode="numeric" max="9" maxlength="1" pattern="[0-9]*" type="text"/>
<input class="flex h-12 w-10 sm:h-14 sm:w-12 text-center [appearance:textfield] focus:outline-none focus:ring-2 focus:ring-primary/50 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-lg font-semibold text-slate-900 dark:text-slate-100 transition-all" inputmode="numeric" max="9" maxlength="1" pattern="[0-9]*" type="text"/>
<input class="flex h-12 w-10 sm:h-14 sm:w-12 text-center [appearance:textfield] focus:outline-none focus:ring-2 focus:ring-primary/50 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-lg font-semibold text-slate-900 dark:text-slate-100 transition-all" inputmode="numeric" max="9" maxlength="1" pattern="[0-9]*" type="text"/>
<input class="flex h-12 w-10 sm:h-14 sm:w-12 text-center [appearance:textfield] focus:outline-none focus:ring-2 focus:ring-primary/50 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-lg font-semibold text-slate-900 dark:text-slate-100 transition-all" inputmode="numeric" max="9" maxlength="1" pattern="[0-9]*" type="text"/>
</fieldset>
</div>
<!-- Action Button -->
<div class="flex flex-col gap-4">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-primary hover:bg-primary/90 text-white text-base font-bold leading-normal tracking-wide transition-colors shadow-lg shadow-primary/25" type="submit">
<span class="truncate">Verify OTP</span>
</button>
<!-- Resend Link -->
<div class="text-center mt-2">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                            Didn't receive the code? 
                            <a class="text-primary hover:underline font-semibold ml-1" href="#">Resend OTP</a>
</p>
</div>
</div>
</form>
</div>
<!-- Support Info Footer -->
<div class="mt-8 text-center max-w-xs">
<p class="text-slate-400 text-xs">
                Secured by 256-bit encryption. If you're having trouble, contact our support team at <span class="text-slate-500 font-medium">support@app.com</span>
</p>
</div>
</div>
</body></html>
